# ============================================================
# Deploy Backend to Fly.io
# ============================================================
# Deploys the FastAPI backend to Fly.io
# Requires: FLY_API_TOKEN secret in GitHub repository settings
# ============================================================

name: Deploy Backend to Fly.io

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        default: "production"
        type: choice
        options:
          - production
          - staging
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-fly.yml"

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Verify Fly.io auth
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl auth whoami
          echo "✅ Fly.io auth verified"

      - name: Create app (idempotent)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        working-directory: backend
        run: |
          flyctl apps create infinity-portal-api --org personal 2>&1 || true
          echo "App ready"

      - name: Set backend secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        working-directory: backend
        run: |
          # Set required environment variables as Fly secrets
          flyctl secrets set \
            SECRET_KEY="${{ secrets.BACKEND_SECRET_KEY || 'change-me-in-production-use-a-long-random-string' }}" \
            DATABASE_URL="${{ secrets.DATABASE_URL || 'sqlite:///./infinity.db' }}" \
            REDIS_URL="${{ secrets.REDIS_URL || '' }}" \
            ALLOWED_ORIGINS="https://infinity-portal.pages.dev,https://infinity-portal.com" \
            --app infinity-portal-api 2>&1 || true
          echo "✅ Secrets configured"

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        working-directory: backend
        run: |
          flyctl deploy \
            --config fly.toml \
            --remote-only \
            --wait-timeout 120
          echo "✅ Backend deployed"

      - name: Verify deployment
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "=== App Status ==="
          flyctl status --app infinity-portal-api

          echo ""
          echo "=== Health Check ==="
          for i in {1..8}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://infinity-portal-api.fly.dev/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend is live! (attempt $i)"
              curl -s "https://infinity-portal-api.fly.dev/health"
              exit 0
            fi
            echo "⏳ Attempt $i: status=$STATUS, retrying in 15s..."
            sleep 15
          done
          echo "⚠️  Backend may still be starting — check https://infinity-portal-api.fly.dev/health"

      - name: Deployment Summary
        if: always()
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║  ∞  INFINITY PORTAL — Backend Deploy         ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  App:       infinity-portal-api              ║"
          echo "║  Region:    lhr (London)                     ║"
          echo "║  URL:       https://infinity-portal-api.fly.dev"
          echo "║  Health:    https://infinity-portal-api.fly.dev/health"
          echo "║  Commit:    ${{ github.sha }}"
          echo "╚══════════════════════════════════════════════╝"