# Microsoft Security DevOps (MSDO) — Trancendos Universe
# Scans for security issues using Microsoft Security DevOps tools
# Checkov results are informational only (continue-on-error: true)

name: "Microsoft Defender For Devops"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '32 17 * * 0'

jobs:
  MSDO:
    runs-on: windows-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - name: Run Microsoft Security DevOps
        uses: microsoft/security-devops-action@v1.6.0
        id: msdo
        with:
          # Run Bandit (Python) and ESLint (JS/TS) only
          # Exclude checkov (IaC) as Terraform configs are in early stage
          categories: 'code'
        continue-on-error: true

      - name: Upload SARIF results
        if: always() && steps.msdo.outputs.sarifFile != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.msdo.outputs.sarifFile }}
        continue-on-error: true
