# Mayhem for API — ForAllSecure API fuzzing
# Requires: MAYHEM_TOKEN secret + running API endpoint
# continue-on-error: true until Mayhem account is configured

name: "Mayhem for API"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  mayhem-for-api:
    name: Mayhem for API
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Mayhem token
        id: check_token
        run: |
          if [ -n "${{ secrets.MAYHEM_TOKEN }}" ]; then
            echo "has_token=true" >> $GITHUB_OUTPUT
          else
            echo "MAYHEM_TOKEN not configured — skipping Mayhem scan"
            echo "has_token=false" >> $GITHUB_OUTPUT
          fi

      - name: Start Infinity OS API (mock)
        if: steps.check_token.outputs.has_token == 'true'
        run: |
          echo "Starting API for Mayhem scan..."
          # TODO: Start actual API when endpoint is available
          # npx wrangler dev workers/orchestrator/src/index.ts --port 8787 &
          # sleep 5
        continue-on-error: true

      - name: Run Mayhem for API
        if: steps.check_token.outputs.has_token == 'true'
        uses: ForAllSecure/mapi-action@v2
        continue-on-error: true
        with:
          mayhem-token: ${{ secrets.MAYHEM_TOKEN }}
          api-url: http://localhost:8787
          api-spec: docs/openapi.yaml
          duration: 60
          sarif-report: mapi.sarif

      - name: Upload SARIF
        if: steps.check_token.outputs.has_token == 'true' && hashFiles('mapi.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: mapi.sarif
        continue-on-error: true

      - name: Mayhem status
        if: always()
        run: |
          if [ "${{ steps.check_token.outputs.has_token }}" = "false" ]; then
            echo "ℹ️  Mayhem for API scan skipped — configure MAYHEM_TOKEN secret to enable"
          else
            echo "✅ Mayhem scan completed"
          fi
