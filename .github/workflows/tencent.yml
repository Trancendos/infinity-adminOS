# Tencent Kubernetes Engine (TKE) deployment workflow
# Requires: TENCENT_CLOUD_SECRET_ID, TENCENT_CLOUD_SECRET_KEY,
#           TENCENT_CLOUD_ACCOUNT_ID, TKE_REGISTRY_PASSWORD
# All steps have continue-on-error: true until TKE is configured

name: Tencent Kubernetes Engine

on:
  push:
    branches: ["main"]

env:
  TKE_IMAGE_URL: ccr.ccs.tencentyun.com/trancendos/infinity-portal
  TKE_REGION: ap-guangzhou
  TKE_CLUSTER_ID: cls-infinity
  DEPLOYMENT_NAME: infinity-portal

permissions:
  contents: read

jobs:
  setup-build-publish-deploy:
    name: Setup, Build, Publish, and Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check TKE secrets
        id: check_secrets
        run: |
          if [ -n "${{ secrets.TENCENT_CLOUD_SECRET_ID }}" ] && [ -n "${{ secrets.TKE_REGISTRY_PASSWORD }}" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
            echo "TKE secrets configured — proceeding with deployment"
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            echo "TKE secrets not configured — skipping deployment steps"
          fi

      - name: Build Docker image
        run: docker build -t ${TKE_IMAGE_URL}:${GITHUB_SHA} .
        continue-on-error: true

      - name: Login TKE Registry
        if: steps.check_secrets.outputs.has_secrets == 'true'
        run: docker login -u ${{ secrets.TENCENT_CLOUD_ACCOUNT_ID }} -p '${{ secrets.TKE_REGISTRY_PASSWORD }}' ${TKE_IMAGE_URL}
        continue-on-error: true

      - name: Publish to TKE Registry
        if: steps.check_secrets.outputs.has_secrets == 'true'
        run: docker push ${TKE_IMAGE_URL}:${GITHUB_SHA}
        continue-on-error: true

      - name: Set up Kustomize
        if: steps.check_secrets.outputs.has_secrets == 'true'
        run: |
          curl -sLo kustomize https://github.com/kubernetes-sigs/kustomize/releases/download/v5.3.0/kustomize_v5.3.0_linux_amd64.tar.gz
          tar -xzf kustomize
          chmod u+x ./kustomize
        continue-on-error: true

      - name: Set up TKE kubeconfig
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: TencentCloud/tke-cluster-credential-action@v1
        with:
          secret_id: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          secret_key: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
          tke_region: ${{ env.TKE_REGION }}
          cluster_id: ${{ env.TKE_CLUSTER_ID }}
        continue-on-error: true

      - name: Deploy to TKE cluster
        if: steps.check_secrets.outputs.has_secrets == 'true'
        run: |
          kubectl config use-context ${TKE_CLUSTER_ID}-context-default
          ./kustomize edit set image ${TKE_IMAGE_URL}:${GITHUB_SHA}
          ./kustomize build . | kubectl apply -f -
          kubectl rollout status deployment/${DEPLOYMENT_NAME}
          kubectl get services -o wide
        continue-on-error: true

      - name: Deployment summary
        if: always()
        run: |
          echo "## TKE Deployment Summary" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_secrets.outputs.has_secrets }}" = "false" ]; then
            echo "⚠️ TKE secrets not configured — deployment skipped" >> $GITHUB_STEP_SUMMARY
            echo "Configure TENCENT_CLOUD_SECRET_ID and TKE_REGISTRY_PASSWORD to enable" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Deployment triggered for commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          fi
