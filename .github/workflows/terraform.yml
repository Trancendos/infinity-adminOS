name: Terraform

on:
  push:
    branches: ["main"]
    paths:
      - 'infrastructure/**/*.tf'
      - 'infrastructure/**/*.tfvars'
      - '.github/workflows/terraform.yml'
  pull_request:
    paths:
      - 'infrastructure/**/*.tf'
      - 'infrastructure/**/*.tfvars'

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: infrastructure

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Terraform files
        id: check_tf
        run: |
          if ls *.tf 2>/dev/null | head -1 > /dev/null 2>&1; then
            echo "has_tf=true" >> $GITHUB_OUTPUT
            echo "Found Terraform configuration files"
          else
            echo "has_tf=false" >> $GITHUB_OUTPUT
            echo "No .tf files found in infrastructure/ — skipping Terraform steps"
          fi

      - name: Setup Terraform
        if: steps.check_tf.outputs.has_tf == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
        continue-on-error: true

      - name: Terraform Init
        if: steps.check_tf.outputs.has_tf == 'true'
        run: terraform init -backend=false
        continue-on-error: true

      - name: Terraform Format Check
        if: steps.check_tf.outputs.has_tf == 'true'
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        if: steps.check_tf.outputs.has_tf == 'true'
        run: terraform validate
        continue-on-error: true

      - name: Terraform Plan
        if: steps.check_tf.outputs.has_tf == 'true'
        run: terraform plan -input=false -no-color
        continue-on-error: true
