# k8s/deployment.yaml — Infinity OS API Deployment
# Trancendos 2060 Standard — Production Kubernetes Manifest
# ═══════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infinity-os-api
  namespace: infinity
  labels:
    app: infinity-os
    component: api
    standard: "2060"
    version: "3.0.0"
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: infinity-os
      component: api
  template:
    metadata:
      labels:
        app: infinity-os
        component: api
        standard: "2060"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: infinity-os-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 45
      containers:
        - name: api
          image: ghcr.io/trancendos/infinity-os-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - secretRef:
                name: infinity-os-secrets
            - configMapRef:
                name: infinity-os-config
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: PORT
              value: "8000"
            - name: WORKERS
              value: "4"
            - name: LOG_LEVEL
              value: "WARNING"
            - name: RATE_LIMIT_ENABLED
              value: "true"
            - name: DATA_RESIDENCY_DEFAULT
              value: "eu"
            - name: CONSENT_REQUIRED
              value: "true"
            - name: AI_AUDIT_ENABLED
              value: "true"
            - name: ZERO_COST_MODE
              value: "true"
            - name: FUTURE_PROOF_LEVEL
              value: "2060"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          volumeMounts:
            - name: data-files
              mountPath: /data/files
            - name: data-repos
              mountPath: /data/repos
            - name: data-builds
              mountPath: /data/builds
      volumes:
        - name: data-files
          persistentVolumeClaim:
            claimName: infinity-files-pvc
        - name: data-repos
          persistentVolumeClaim:
            claimName: infinity-repos-pvc
        - name: data-builds
          persistentVolumeClaim:
            claimName: infinity-builds-pvc
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: infinity-os
              component: api
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: infinity-os-api
  namespace: infinity
  labels:
    app: infinity-os
    component: api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: infinity-os
    component: api
---
# Ingress (NGINX Ingress Controller)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infinity-os-api
  namespace: infinity
  labels:
    app: infinity-os
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.infinity-os.dev
      secretName: infinity-os-tls
  rules:
    - host: api.infinity-os.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: infinity-os-api
                port:
                  name: http
---
# HPA (Horizontal Pod Autoscaler)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: infinity-os-api
  namespace: infinity
  labels:
    app: infinity-os
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: infinity-os-api
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: infinity-os-api
  namespace: infinity
  labels:
    app: infinity-os
---
# ConfigMap (non-sensitive configuration)
apiVersion: v1
kind: ConfigMap
metadata:
  name: infinity-os-config
  namespace: infinity
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "WARNING"
  WORKERS: "4"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_DEFAULT: "100/minute"
  MAX_REQUEST_SIZE_MB: "50"
  DATA_RESIDENCY_DEFAULT: "eu"
  CONSENT_REQUIRED: "true"
  AI_AUDIT_ENABLED: "true"
  ZERO_COST_MODE: "true"
  FUTURE_PROOF_LEVEL: "2060"
  EVENT_BUS_BACKEND: "redis"
  OTEL_SERVICE_NAME: "infinity-os-api"
---
# PersistentVolumeClaims
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: infinity-files-pvc
  namespace: infinity
spec:
  accessModes: [ReadWriteMany]
  storageClassName: standard
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: infinity-repos-pvc
  namespace: infinity
spec:
  accessModes: [ReadWriteMany]
  storageClassName: standard
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: infinity-builds-pvc
  namespace: infinity
spec:
  accessModes: [ReadWriteMany]
  storageClassName: standard
  resources:
    requests:
      storage: 20Gi