# ══════════════════════════════════════════════════════════════
# TRANCENDOS ECOSYSTEM — Nginx Reverse Proxy / API Gateway
# ══════════════════════════════════════════════════════════════
# Routes all 31 services through a single entry point
# with SSL termination, rate limiting, and health monitoring.
# ══════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"upstream_addr":"$upstream_addr",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_forwarded_for":"$http_x_forwarded_for"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ─────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    client_max_body_size 500M;
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 32k;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Rate Limiting ───────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_global:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=api_auth:5m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api_upload:5m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Security Headers ────────────────────────────────────
    map $sent_http_content_type $csp_header {
        default "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:;";
    }

    # ── Upstream Definitions ────────────────────────────────
    # Wave 1 — Core Platform
    upstream infinity-portal { server infinity-portal:3000; }

    # Wave 2 — AI Agents
    upstream guardian-ai     { server guardian-ai:3000; }
    upstream cornelius-ai    { server cornelius-ai:3000; }
    upstream dorris-ai       { server dorris-ai:3000; }
    upstream norman-ai       { server norman-ai:3000; }
    upstream the-dr-ai       { server the-dr-ai:3000; }

    # Wave 3 — Infrastructure
    upstream the-agora       { server the-agora:3000; }
    upstream the-citadel     { server the-citadel:3000; }
    upstream the-hive        { server the-hive:3000; }
    upstream the-library     { server the-library:3000; }
    upstream the-nexus       { server the-nexus:3000; }
    upstream the-observatory { server the-observatory:3000; }
    upstream the-treasury    { server the-treasury:3000; }
    upstream the-workshop    { server the-workshop:3000; }
    upstream arcadia         { server arcadia:3000; }

    # Wave 4 — Intelligence
    upstream serenity-ai     { server serenity-ai:3000; }
    upstream oracle-ai       { server oracle-ai:3000; }
    upstream porter-family-ai { server porter-family-ai:3000; }
    upstream prometheus-ai   { server prometheus-ai:3000; }
    upstream queen-ai        { server queen-ai:3000; }
    upstream renik-ai        { server renik-ai:3000; }
    upstream sentinel-ai     { server sentinel-ai:3000; }
    upstream solarscene-ai   { server solarscene-ai:3000; }

    # Wave 5 — Marketplace
    upstream api-marketplace { server api-marketplace:3000; }
    upstream artifactory     { server artifactory:3041; }

    # Wave 6 — Studios
    upstream section7        { server section7:3000; }
    upstream style-and-shoot { server style-and-shoot:3000; }
    upstream fabulousa       { server fabulousa:3000; }
    upstream tranceflow      { server tranceflow:3000; }
    upstream tateking        { server tateking:3000; }
    upstream the-digitalgrid { server the-digitalgrid:3000; }

    # ════════════════════════════════════════════════════════
    # HTTPS Server (Production)
    # ════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.trancendos.com *.trancendos.com;

        # SSL Configuration
        ssl_certificate     /etc/ssl/certs/trancendos.crt;
        ssl_certificate_key /etc/ssl/private/trancendos.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy $csp_header always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Trancendos-Gateway "v1.0" always;

        # Global rate limit
        limit_req zone=api_global burst=200 nodelay;
        limit_conn conn_limit 100;

        # ── Health & Status ─────────────────────────────────
        location /health {
            access_log off;
            return 200 '{"status":"healthy","gateway":"trancendos-nginx","services":31}';
            add_header Content-Type application/json;
        }

        location /gateway/status {
            stub_status on;
            access_log off;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            deny all;
        }

        # ── Wave 1: Core Platform ──────────────────────────
        location / {
            proxy_pass http://infinity-portal;
            include /etc/nginx/proxy_params;
        }

        # ── Wave 2: AI Agents ──────────────────────────────
        location /api/guardian/ {
            proxy_pass http://guardian-ai/;
            include /etc/nginx/proxy_params;
        }
        location /api/cornelius/ {
            proxy_pass http://cornelius-ai/;
            include /etc/nginx/proxy_params;
        }
        location /api/dorris/ {
            proxy_pass http://dorris-ai/;
            include /etc/nginx/proxy_params;
        }
        location /api/norman/ {
            proxy_pass http://norman-ai/;
            include /etc/nginx/proxy_params;
        }
        location /api/dr/ {
            proxy_pass http://the-dr-ai/;
            include /etc/nginx/proxy_params;
        }

        # ── Wave 3: Infrastructure ─────────────────────────
        location /api/agora/ {
            proxy_pass http://the-agora/;
            include /etc/nginx/proxy_params;
        }
        location /api/citadel/ {
            proxy_pass http://the-citadel/;
            include /etc/nginx/proxy_params;
        }
        location /api/hive/ {
            proxy_pass http://the-hive/;
            include /etc/nginx/proxy_params;
        }
        location /api/library/ {
            proxy_pass http://the-library/;
            include /etc/nginx/proxy_params;
        }
        location /api/nexus/ {
            proxy_pass http://the-nexus/;
            include /etc/nginx/proxy_params;
        }
        location /api/observatory/ {
            proxy_pass http://the-observatory/;
            include /etc/nginx/proxy_params;
        }
        location /api/treasury/ {
            proxy_pass http://the-treasury/;
            include /etc/nginx/proxy_params;
        }
        location /api/workshop/ {
            proxy_pass http://the-workshop/;
            include /etc/nginx/proxy_params;
        }
        location /api/arcadia/ {
            proxy_pass http://arcadia/;
            include /etc/nginx/proxy_params;
        }

        # ── Wave 4: Intelligence ───────────────────────────
        location /api/serenity/ {
            proxy_pass http://serenity-ai/;
            include /etc/nginx/proxy_params;
        }
        location /api/oracle/ {
            proxy_pass http://oracle-ai/;
            include /etc/nginx/proxy_params;
        }
        location /api/porter/ {
            proxy_pass http://porter-family-ai/;
            include /etc/nginx/proxy_params;
        }
        location /api/prometheus/ {
            proxy_pass http://prometheus-ai/;
            include /etc/nginx/proxy_params;
        }
        location /api/queen/ {
            proxy_pass http://queen-ai/;
            include /etc/nginx/proxy_params;
        }
        location /api/renik/ {
            proxy_pass http://renik-ai/;
            include /etc/nginx/proxy_params;
        }
        location /api/sentinel/ {
            proxy_pass http://sentinel-ai/;
            include /etc/nginx/proxy_params;
        }
        location /api/solarscene/ {
            proxy_pass http://solarscene-ai/;
            include /etc/nginx/proxy_params;
        }

        # ── Wave 5: Marketplace ────────────────────────────
        location /api/marketplace/ {
            proxy_pass http://api-marketplace/;
            include /etc/nginx/proxy_params;
        }
        location /api/artifactory/ {
            proxy_pass http://artifactory/;
            include /etc/nginx/proxy_params;
            client_max_body_size 500M;
            limit_req zone=api_upload burst=10 nodelay;
        }

        # ── Wave 6: Studios ────────────────────────────────
        location /api/studio/section7/ {
            proxy_pass http://section7/;
            include /etc/nginx/proxy_params;
        }
        location /api/studio/style-and-shoot/ {
            proxy_pass http://style-and-shoot/;
            include /etc/nginx/proxy_params;
        }
        location /api/studio/fabulousa/ {
            proxy_pass http://fabulousa/;
            include /etc/nginx/proxy_params;
        }
        location /api/studio/tranceflow/ {
            proxy_pass http://tranceflow/;
            include /etc/nginx/proxy_params;
        }
        location /api/studio/tateking/ {
            proxy_pass http://tateking/;
            include /etc/nginx/proxy_params;
        }
        location /api/studio/digitalgrid/ {
            proxy_pass http://the-digitalgrid/;
            include /etc/nginx/proxy_params;
        }
    }

    # ════════════════════════════════════════════════════════
    # HTTP → HTTPS Redirect
    # ════════════════════════════════════════════════════════
    server {
        listen 80;
        listen [::]:80;
        server_name api.trancendos.com *.trancendos.com;
        return 301 https://$host$request_uri;
    }
}