name = "module-registry"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[observability.logs]
head_sampling_rate = 1

[[d1_databases]]
binding = "DB"
database_name = "infinity-os-db"
database_id = "placeholder-registry-db-id"

[[kv_namespaces]]
binding = "CACHE"
id = "placeholder-registry-cache-id"

[[r2_buckets]]
binding = "MODULE_STORE"
bucket_name = "trancendos-module-store"

[[queues.producers]]
binding = "EVENTS_QUEUE"
queue = "platform-events"

[vars]
ENVIRONMENT = "production"