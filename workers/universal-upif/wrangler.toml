name = "universal-upif"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
DPID = "DPID-ORC-UPF-001"
SERVICE_NAME = "Universal UPIF"
PORT = "3078"
ECOSYSTEM = "NEXUS"
IDENTITY_VERSION = "UPIF-3.0"
BIOMETRIC_ENABLED = "true"
GDP_CONTRIBUTION_TRACKING = "true"
AGENTIC_GDP_MODE = "ACTIVE"

[[services]]
binding = "SENTINEL_STATION"
service = "sentinel-station"

[[services]]
binding = "BER_ENGINE"
service = "ber-engine"

[dev]
port = 3078
