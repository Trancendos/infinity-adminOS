name = "arcadia-exchange"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
ARC_TOKEN_CONTRACT = "REPLACE_WITH_CONTRACT_ADDRESS"
PLATFORM_WALLET = "REPLACE_WITH_PLATFORM_WALLET"

# KV Namespaces
[[kv_namespaces]]
binding = "MARKETPLACE"
id = "4e07cdedc58d4cbaaa538406490d6520"
preview_id = "4e07cdedc58d4cbaaa538406490d6520"

[[kv_namespaces]]
binding = "ORDER_BOOK"
id = "fb8655ac85ce4ed18626570ef1f06c7c"
preview_id = "fb8655ac85ce4ed18626570ef1f06c7c"

[[kv_namespaces]]
binding = "WALLETS"
id = "92b1b9ffa668497bb9b1db102d1a7684"
preview_id = "92b1b9ffa668497bb9b1db102d1a7684"

[[kv_namespaces]]
binding = "BOT_STATE"
id = "996ec101236d4b938d28843a91f380b8"
preview_id = "996ec101236d4b938d28843a91f380b8"

[[kv_namespaces]]
binding = "PORTFOLIO"
id = "a4b6be6977934142b386caf700fcc4e4"
preview_id = "a4b6be6977934142b386caf700fcc4e4"

# Durable Objects (using sqlite_classes for free tier)
[[durable_objects.bindings]]
name = "TRADING_ENGINE"
class_name = "TradingEngine"

[[durable_objects.bindings]]
name = "MARKET_MAKER"
class_name = "MarketMaker"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TradingEngine", "MarketMaker"]

# D1 Database
[[d1_databases]]
binding = "EXCHANGE_DB"
database_name = "arcadia-exchange"
database_id = "4a5a6e28-56af-4c38-b39c-d3a5e97f75fd"

# AI Binding
[ai]
binding = "AI"

# Cron Triggers (disabled - account cron limit reached; enable via CF dashboard)
# [triggers]
# crons = ["*/5 * * * *", "*/15 * * * *", "0 * * * *"]

[env.staging]
name = "arcadia-exchange-staging"
vars = { ENVIRONMENT = "staging" }

[env.development]
name = "arcadia-exchange-dev"
vars = { ENVIRONMENT = "development" }
