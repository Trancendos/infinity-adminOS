name = "infinity-monitoring-dashboard"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "infinity-monitoring"
database_id = "PLACEHOLDER_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "KV_METRICS"
id = "PLACEHOLDER_KV_METRICS_ID"

[[kv_namespaces]]
binding = "KV_ALERTS"
id = "PLACEHOLDER_KV_ALERTS_ID"

[vars]
ENVIRONMENT = "production"
WORKER_VERSION = "1.0.0"

[env.production]
name = "infinity-monitoring-dashboard"

[[env.production.d1_databases]]
binding = "DB"
database_name = "infinity-monitoring-prod"
database_id = "PLACEHOLDER_D1_DATABASE_ID_PROD"

[[env.production.kv_namespaces]]
binding = "KV_METRICS"
id = "PLACEHOLDER_KV_METRICS_PROD_ID"

[[env.production.kv_namespaces]]
binding = "KV_ALERTS"
id = "PLACEHOLDER_KV_ALERTS_PROD_ID"

[env.staging]
name = "infinity-monitoring-dashboard-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "infinity-monitoring-staging"
database_id = "PLACEHOLDER_D1_DATABASE_ID_STAGING"

[[env.staging.kv_namespaces]]
binding = "KV_METRICS"
id = "PLACEHOLDER_KV_METRICS_STAGING_ID"

[[env.staging.kv_namespaces]]
binding = "KV_ALERTS"
id = "PLACEHOLDER_KV_ALERTS_STAGING_ID"