name = "infinity-monitoring-dashboard"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "infinity-monitoring"
database_id = "34480b66-65e7-4de6-957c-4d1abafe56d6"

[[kv_namespaces]]
binding = "KV_METRICS"
id = "3bc9913c458146b9a5a87fe2bdd55c99"

[[kv_namespaces]]
binding = "KV_ALERTS"
id = "d3bd442bab104cfc9c77ed0503480618"

[vars]
ENVIRONMENT = "production"
WORKER_VERSION = "1.0.0"

[env.production]
name = "infinity-monitoring-dashboard"

[[env.production.d1_databases]]
binding = "DB"
database_name = "infinity-monitoring-prod"
database_id = "34480b66-65e7-4de6-957c-4d1abafe56d6_PROD"

[[env.production.kv_namespaces]]
binding = "KV_METRICS"
id = "3bc9913c458146b9a5a87fe2bdd55c99"

[[env.production.kv_namespaces]]
binding = "KV_ALERTS"
id = "d3bd442bab104cfc9c77ed0503480618"

[env.staging]
name = "infinity-monitoring-dashboard-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "infinity-monitoring-staging"
database_id = "34480b66-65e7-4de6-957c-4d1abafe56d6_STAGING"

[[env.staging.kv_namespaces]]
binding = "KV_METRICS"
id = "3bc9913c458146b9a5a87fe2bdd55c99"

[[env.staging.kv_namespaces]]
binding = "KV_ALERTS"
id = "d3bd442bab104cfc9c77ed0503480618"
# ── Observability ────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1.0
