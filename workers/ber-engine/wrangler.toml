name = "ber-engine"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[vars]
SERVICE_NAME = "ber-engine"
DPID = "DPID-PCK-PIL6-002"
PILLAR = "Wellbeing"
ECOSYSTEM = "Tranquility"
PORT = "3061"

[[kv_namespaces]]
binding = "BER_STATE"
id = "ber_engine_state"
