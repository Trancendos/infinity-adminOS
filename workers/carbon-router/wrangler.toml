name = "carbon-router"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[vars]
DPID = "DPID-ECO-CAR-001"
SERVICE_NAME = "Carbon Router"
PORT = "3082"
ECOSYSTEM = "PULSE"
CARBON_BUDGET_KG_PER_DAY = "50"
RENEWABLE_ENERGY_PREFERENCE = "true"
CARBON_CREDIT_ENABLED = "true"

[[services]]
binding = "SENTINEL_STATION"
service = "sentinel-station"

[dev]
port = 3082

# ── Observability ────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1.0
