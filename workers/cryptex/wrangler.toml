# Cryptex Worker — Cyber Defense Application (VAI Renik)
# ═══════════════════════════════════════════════════════════════
# Advanced cyber defense platform providing threat intelligence,
# penetration testing, DDoS mitigation, and CVE scanning capabilities.

name = "infinity-cryptex"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

# ── Production ──────────────────────────────────────────────
[env.production]
name = "infinity-cryptex"

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "infinity-os-db"
database_id = "placeholder-d1-id"

[[env.production.kv_namespaces]]
binding = "THREAT_CACHE"
id = "placeholder-threat-cache-kv-id"

[[env.production.kv_namespaces]]
binding = "CVE_CACHE"
id = "placeholder-cve-cache-kv-id"

# ── Staging ──────────────────────────────────────────────────
[env.staging]
name = "infinity-cryptex-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "infinity-os-db"
database_id = "placeholder-d1-staging-id"

[[env.staging.kv_namespaces]]
binding = "THREAT_CACHE"
id = "placeholder-threat-cache-kv-staging-id"

[[env.staging.kv_namespaces]]
binding = "CVE_CACHE"
id = "placeholder-cve-cache-kv-staging-id"

# ── Observability ────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1.0