# INFINITY-ONE Worker — Central Account Management Hub
# 100% Cloudflare: D1 + KV + Zero third-party deps

name = "infinity-one"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
LIGHTHOUSE_URL = "https://infinity-lighthouse.luminous-aimastermind.workers.dev"
HIVE_URL = "https://infinity-hive.luminous-aimastermind.workers.dev"

# ── Production ──────────────────────────────────────────────
[env.production]
name = "infinity-one"

[env.production.vars]
ENVIRONMENT = "production"
LIGHTHOUSE_URL = "https://infinity-lighthouse.luminous-aimastermind.workers.dev"
HIVE_URL = "https://infinity-hive.luminous-aimastermind.workers.dev"

[[env.production.d1_databases]]
binding = "DB"
database_name = "infinity-os-db"
database_id = "placeholder-d1-id"

[[env.production.kv_namespaces]]
binding = "KV_SESSIONS"
id = "placeholder-infinity-one-sessions-kv-id"

[[env.production.kv_namespaces]]
binding = "KV_RATE_LIMIT"
id = "placeholder-infinity-one-ratelimit-kv-id"

# ── Staging ──────────────────────────────────────────────────
[env.staging]
name = "infinity-one-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "infinity-os-db"
database_id = "placeholder-d1-staging-id"

[[env.staging.kv_namespaces]]
binding = "KV_SESSIONS"
id = "placeholder-infinity-one-sessions-kv-staging-id"

[[env.staging.kv_namespaces]]
binding = "KV_RATE_LIMIT"
id = "placeholder-infinity-one-ratelimit-kv-staging-id"
# ── Observability ────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1.0
