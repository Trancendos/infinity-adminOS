# ════════════════════════════════════════════════════════════
# Filesystem Worker — R2-Backed File Storage
# ════════════════════════════════════════════════════════════
# Tenant-isolated file storage with CRUD, directory listing,
# batch operations, copy, and storage analytics.

name = "filesystem-worker"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# ── R2 Storage Bucket ─────────────────────────────────────
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "infinity-files"

# ── D1 Database ───────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "infinity-os-db"
database_id = "placeholder-add-real-id"

# ── KV Namespace (Cache) ─────────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id = "placeholder-add-real-id"

# ── Environment Variables ─────────────────────────────────
[vars]
ENVIRONMENT = "development"

# ── Observability ─────────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1.0