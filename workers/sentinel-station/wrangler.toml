name = "sentinel-station"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[vars]
SERVICE_NAME = "sentinel-station"
DPID = "DPID-SEN-CORE-001"
LOCATION_ID = "L23"
LOCATION_NAME = "Sentinel Station"
MESH_ADDRESS = "sentinel-station:3060"
PORT = "3060"

[[kv_namespaces]]
binding = "TUNNEL_STORE"
id = "sentinel_station_tunnels"
preview_id = "sentinel_station_tunnels_preview"

[[kv_namespaces]]
binding = "PASSPORT_STORE"
id = "sentinel_station_passports"
preview_id = "sentinel_station_passports_preview"
# ── Observability ────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1.0
