name = "oracle-foresight"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[vars]
SERVICE_NAME = "oracle-foresight"
DPID = "DPID-ORC-SUITE-001"
PORT = "3075"

[[kv_namespaces]]
binding = "FORESIGHT_STORE"
id = "oracle_foresight_store"
preview_id = "oracle_foresight_store_preview"

# ── Observability ────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1.0
