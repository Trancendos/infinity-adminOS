name = "chrono-intelligence"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[vars]
DPID = "DPID-ORC-CHR-001"
SERVICE_NAME = "Chrono-Intelligence Oracle"
PORT = "3076"
ECOSYSTEM = "SENTIENT"
LNN_MODEL = "liquid-temporal-v3"
FORECAST_HORIZON_DAYS = "365"
TEMPORAL_RESOLUTION = "1h"

[[services]]
binding = "SENTINEL_STATION"
service = "sentinel-station"

[[services]]
binding = "ORACLE_FORESIGHT"
service = "oracle-foresight"

[dev]
port = 3076

# ── Observability ────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1.0
