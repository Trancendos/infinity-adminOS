# ════════════════════════════════════════════════════════════
# AI Worker — Unified AI Inference Proxy
# ════════════════════════════════════════════════════════════
# Routes all AI requests through a single gateway with
# tenant isolation, rate limiting, caching, and multi-provider support.

name = "ai-worker"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# ── Workers AI Binding ─────────────────────────────────────
[ai]
binding = "AI"

# ── D1 Database ────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "infinity-os-db"
database_id = "placeholder-add-real-id"

# ── KV Namespace (Cache + Rate Limits) ─────────────────────
[[kv_namespaces]]
binding = "CACHE"
id = "placeholder-add-real-id"

# ── Analytics Engine (Usage Tracking) ──────────────────────
[[analytics_engine_datasets]]
binding = "USAGE_ANALYTICS"
dataset = "ai_usage"

# ── Environment Variables ──────────────────────────────────
[vars]
ENVIRONMENT = "development"

# OPENAI_API_KEY and ANTHROPIC_API_KEY should be set via:
#   wrangler secret put OPENAI_API_KEY
#   wrangler secret put ANTHROPIC_API_KEY

# ── Observability ──────────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1.0