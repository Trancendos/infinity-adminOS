# THE LIBRARY Worker — Knowledge Base & Wiki Consolidation
# VAI Zimik: AI-Powered Knowledge Management
# 100% Cloudflare: D1 + KV + R2 + Zero third-party deps

name = "infinity-library"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
LIGHTHOUSE_URL = "https://infinity-lighthouse.luminous-aimastermind.workers.dev"
HIVE_URL = "https://infinity-hive.luminous-aimastermind.workers.dev"
INFINITY_ONE_URL = "https://infinity-auth-api.luminous-aimastermind.workers.dev"
ZIMIK_API_KEY = "placeholder-zimik-key"

# ── Production ──────────────────────────────────────────────
[env.production]
name = "infinity-library"

[env.production.vars]
ENVIRONMENT = "production"
LIGHTHOUSE_URL = "https://infinity-lighthouse.luminous-aimastermind.workers.dev"
HIVE_URL = "https://infinity-hive.luminous-aimastermind.workers.dev"
INFINITY_ONE_URL = "https://infinity-auth-api.luminous-aimastermind.workers.dev"
ZIMIK_API_KEY = "placeholder-zimik-prod-key"

[[env.production.d1_databases]]
binding = "DB"
database_name = "infinity-os-db"
database_id = "placeholder-d1-id"

[[env.production.kv_namespaces]]
binding = "KV_KNOWLEDGE_CACHE"
id = "placeholder-library-cache-kv-id"

[[env.production.kv_namespaces]]
binding = "KV_RATE_LIMIT"
id = "placeholder-library-ratelimit-kv-id"

[[env.production.r2_buckets]]
binding = "R2_DOCUMENTS"
bucket_name = "infinity-library-documents"

# ── Staging ──────────────────────────────────────────────────
[env.staging]
name = "infinity-library-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "infinity-os-db"
database_id = "placeholder-d1-staging-id"

[[env.staging.kv_namespaces]]
binding = "KV_KNOWLEDGE_CACHE"
id = "placeholder-library-cache-kv-staging-id"

[[env.staging.kv_namespaces]]
binding = "KV_RATE_LIMIT"
id = "placeholder-library-ratelimit-kv-staging-id"

[[env.staging.r2_buckets]]
binding = "R2_DOCUMENTS"
bucket_name = "infinity-library-documents-staging"
# ── Observability ────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1.0