name = "depin-broker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
DPID = "DPID-ECO-DEP-001"
SERVICE_NAME = "DePIN Broker"
PORT = "3081"
ECOSYSTEM = "PULSE"
NETWORK_TYPE = "HELIUM_SOLANA_HYBRID"
STAKING_ENABLED = "true"
CARBON_TRACKING = "true"

[[services]]
binding = "SENTINEL_STATION"
service = "sentinel-station"

[[services]]
binding = "CARBON_ROUTER"
service = "carbon-router"

[dev]
port = 3081
