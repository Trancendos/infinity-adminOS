name = "arcadia-royal-bank"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
PLATFORM_NAME = "Arcadia"

# KV Namespaces
[[kv_namespaces]]
binding = "COST_PROFILES"
id = "REPLACE_WITH_COST_PROFILES_KV_ID"
preview_id = "REPLACE_WITH_COST_PROFILES_KV_PREVIEW_ID"

[[kv_namespaces]]
binding = "REVENUE_STREAMS"
id = "REPLACE_WITH_REVENUE_STREAMS_KV_ID"
preview_id = "REPLACE_WITH_REVENUE_STREAMS_KV_PREVIEW_ID"

[[kv_namespaces]]
binding = "APPROVAL_QUEUE"
id = "REPLACE_WITH_APPROVAL_QUEUE_KV_ID"
preview_id = "REPLACE_WITH_APPROVAL_QUEUE_KV_PREVIEW_ID"

[[kv_namespaces]]
binding = "RESEARCH_CACHE"
id = "REPLACE_WITH_RESEARCH_CACHE_KV_ID"
preview_id = "REPLACE_WITH_RESEARCH_CACHE_KV_PREVIEW_ID"

[[kv_namespaces]]
binding = "FREE_TIER_USAGE"
id = "REPLACE_WITH_FREE_TIER_USAGE_KV_ID"
preview_id = "REPLACE_WITH_FREE_TIER_USAGE_KV_PREVIEW_ID"

# D1 Database
[[d1_databases]]
binding = "FINANCIAL_DB"
database_name = "arcadia-financial"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

# AI Binding
[ai]
binding = "AI"

# Cron Triggers
[triggers]
crons = [
  "0 * * * *",      # Every hour: Monitor free tier usage
  "0 */6 * * *",    # Every 6 hours: Revenue research
  "0 9 * * *",      # Daily: Financial report
  "0 9 * * 1",      # Weekly: Full audit
  "0 9 1 * *"       # Monthly: Tax liability
]

# Secrets (set via: wrangler secret put SECRET_NAME)
# JWT_SECRET
# VAULT_TOKEN
# STRIPE_SECRET_KEY
# COINGECKO_API_KEY
# ALPHA_VANTAGE_KEY
# NEWS_API_KEY
# INTERNAL_API_KEY

[env.staging]
name = "arcadia-royal-bank-staging"
vars = { ENVIRONMENT = "staging" }

[env.development]
name = "arcadia-royal-bank-dev"
vars = { ENVIRONMENT = "development" }