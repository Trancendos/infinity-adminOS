name = "arcadia-royal-bank"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
PLATFORM_NAME = "Arcadia"

# KV Namespaces
[[kv_namespaces]]
binding = "COST_PROFILES"
id = "61546b1bb7704981a4868c98dfd0ecae"
preview_id = "61546b1bb7704981a4868c98dfd0ecae"

[[kv_namespaces]]
binding = "REVENUE_STREAMS"
id = "84841d4a52a84839b192b0a54c5b7071"
preview_id = "84841d4a52a84839b192b0a54c5b7071"

[[kv_namespaces]]
binding = "APPROVAL_QUEUE"
id = "d2854b93141e49fdb6bec4dc2ff48408"
preview_id = "d2854b93141e49fdb6bec4dc2ff48408"

[[kv_namespaces]]
binding = "RESEARCH_CACHE"
id = "8801f296d8ca410c836118022dbcc5a2"
preview_id = "8801f296d8ca410c836118022dbcc5a2"

[[kv_namespaces]]
binding = "FREE_TIER_USAGE"
id = "7674640097c043ddadeffb96eedf8766"
preview_id = "7674640097c043ddadeffb96eedf8766"

# D1 Database
[[d1_databases]]
binding = "FINANCIAL_DB"
database_name = "arcadia-financial"
database_id = "0bf4885f-50cb-4b9f-a417-a6d0b9e2aaaf"

# AI Binding
[ai]
binding = "AI"

# Cron Triggers
# Cron Triggers (disabled - account cron limit reached; enable via CF dashboard)
# [triggers]
# crons = ["0 * * * *", "0 */6 * * *", "0 9 * * *"]

# Secrets (set via: wrangler secret put SECRET_NAME)
# JWT_SECRET
# VAULT_TOKEN
# STRIPE_SECRET_KEY
# COINGECKO_API_KEY
# ALPHA_VANTAGE_KEY
# NEWS_API_KEY
# INTERNAL_API_KEY

[env.staging]
name = "arcadia-royal-bank-staging"
vars = { ENVIRONMENT = "staging" }

[env.development]
name = "arcadia-royal-bank-dev"
vars = { ENVIRONMENT = "development" }
# ── Observability ────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1.0
