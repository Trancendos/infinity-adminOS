name = "dpid-registry"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[vars]
DPID = "DPID-REG-CORE-001"
SERVICE_NAME = "DPID Registry Service"
PORT = "3084"
ECOSYSTEM = "NEXUS"
REGISTRY_VERSION = "3.0"
AUTO_REGISTER = "true"

[dev]
port = 3084

# ── Observability ────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1.0
