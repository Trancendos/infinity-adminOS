# LIGHTHOUSE Worker — Cryptographic Token Management Hub
# 100% Cloudflare: D1 + KV + Zero third-party deps

name = "infinity-lighthouse"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
HIVE_URL = "https://infinity-hive.luminous-aimastermind.workers.dev"
VOID_URL = "https://infinity-void.luminous-aimastermind.workers.dev"

# ── Production ──────────────────────────────────────────────
[env.production]
name = "infinity-lighthouse"

[env.production.vars]
ENVIRONMENT = "production"
HIVE_URL = "https://infinity-hive.luminous-aimastermind.workers.dev"
VOID_URL = "https://infinity-void.luminous-aimastermind.workers.dev"

[[env.production.d1_databases]]
binding = "DB"
database_name = "infinity-os-db"
database_id = "placeholder-d1-id"

[[env.production.kv_namespaces]]
binding = "KV_TOKEN_CACHE"
id = "placeholder-lighthouse-cache-kv-id"

[[env.production.kv_namespaces]]
binding = "KV_RATE_LIMIT"
id = "placeholder-lighthouse-ratelimit-kv-id"

# ── Staging ──────────────────────────────────────────────────
[env.staging]
name = "infinity-lighthouse-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "infinity-os-db"
database_id = "placeholder-d1-staging-id"

[[env.staging.kv_namespaces]]
binding = "KV_TOKEN_CACHE"
id = "placeholder-lighthouse-cache-kv-staging-id"

[[env.staging.kv_namespaces]]
binding = "KV_RATE_LIMIT"
id = "placeholder-lighthouse-ratelimit-kv-staging-id"