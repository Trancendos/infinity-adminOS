name = "infinity-os-identity"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ALLOWED_ORIGINS = "https://infinity-os.pages.dev,http://localhost:5173"

# KV Namespace for session storage
[[kv_namespaces]]
binding = "KV"
id = "d66cf4e720db4b44a1807fcb1f55c546"
preview_id = "d66cf4e720db4b44a1807fcb1f55c546"

# D1 Database (optional — can use Supabase instead)
# [[d1_databases]]
# binding = "DB"
# database_name = "infinity-os"
# database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[secrets]
# Set these via: wrangler secret put JWT_SECRET
# JWT_SECRET
# SUPABASE_URL
# SUPABASE_SERVICE_KEY

[dev]
port = 8787
local_protocol = "http"
# ── Observability ────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1.0
