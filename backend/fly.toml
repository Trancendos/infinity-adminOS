# ============================================================
# Infinity Portal — Fly.io Backend Configuration
# ============================================================
# Deploy:  fly deploy --config backend/fly.toml
# Logs:    fly logs --config backend/fly.toml
# Status:  fly status --config backend/fly.toml
# ============================================================

app = "infinity-portal-api"
primary_region = "lhr"  # London — change to your preferred region

[build]
  dockerfile = "Dockerfile"
  target = "production"

[env]
  ENVIRONMENT = "production"
  DEBUG = "false"
  LOG_LEVEL = "warning"
  WORKERS = "2"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[metrics]
  port = 8000
  path = "/metrics"