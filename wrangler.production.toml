# ============================================================
# Trancendos Production Configuration
# Domain: transcendos.com
# ============================================================
# This file provides production-ready configuration templates
# for all Cloudflare Workers in the Trancendos ecosystem.
# ============================================================

# ============================================================
# PLATFORM CORE - Infinity-One (Authentication)
# ============================================================
# name = "infinity-one"
# main = "src/index.ts"
# compatibility_date = "2025-03-01"
# compatibility_flags = ["nodejs_compat"]
# 
# [vars]
# ENVIRONMENT = "production"
# LIGHTHOUSE_URL = "https://tokens.transcendos.com"
# HIVE_URL = "https://router.transcendos.com"
# VOID_URL = "https://secrets.transcendos.com"
# 
# [[routes]]
# pattern = "auth.transcendos.com/*"
# zone_name = "transcendos.com"
# 
# [[d1_databases]]
# binding = "DB"
# database_name = "infinity-os-db"
# database_id = "PRODUCTION_D1_ID_PLACEHOLDER"
# 
# [[kv_namespaces]]
# binding = "KV_SESSIONS"
# id = "PRODUCTION_KV_SESSIONS_ID_PLACEHOLDER"
# 
# [[kv_namespaces]]
# binding = "KV_RATE_LIMIT"
# id = "PRODUCTION_KV_RATELIMIT_ID_PLACEHOLDER"
# 
# [observability]
# enabled = true
# head_sampling_rate = 1.0

