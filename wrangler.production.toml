# ============================================================
# NOTES FOR PRODUCTION DEPLOYMENT
# ============================================================
# 1. Replace all PRODUCTION_*_PLACEHOLDER values with actual IDs
# 2. Create D1 databases: wrangler d1 create infinity-os-db
# 3. Create KV namespaces: wrangler kv:namespace create KV_SESSIONS
# 4. Create R2 buckets: wrangler r2 bucket create transcendos-assets
# 5. Configure custom domains in Cloudflare dashboard
# 6. Set up SSL/TLS certificates (automatic with Cloudflare)
# 7. Configure WAF rules in Cloudflare Security
# 8. Enable Cloudflare Analytics
# ============================================================